<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Valais — Bespoke Alpine Experiences</title>
<meta name="description" content="Premium mobility and bespoke alpine management service operating across the Swiss Alps. Private transfers and luxury ski concierge in Zermatt, Verbier, and Crans-Montana.">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream:      #F8F5EF;
  --cream-deep: #F0EBE1;
  --white:      #FDFCFA;
  --charcoal:   #1E1B17;
  --mid:        #4A4540;
  --gray:       #9A9085;
  --gold:       #B8963E;
  --gold-light: #D4AF6A;
  --stone:      #DDD8CF;
  --stone-dark: #C5BFB4;
  --line:       rgba(184,150,62,0.15);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--cream);
  color: var(--charcoal);
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  overflow-x: hidden;
}

/* NAV */
nav {
  position: fixed; top:0; left:0; right:0; z-index:100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 26px 64px;
  background: transparent;
  transition: background 0.5s, padding 0.4s, box-shadow 0.4s;
}
nav.scrolled {
  background: rgba(253,252,250,0.96);
  backdrop-filter: blur(16px);
  padding: 16px 64px;
  box-shadow: 0 1px 0 var(--stone);
}
.nav-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px; font-weight: 400;
  letter-spacing: 0.38em; text-transform: uppercase;
  color: var(--white); text-decoration: none;
  transition: color 0.4s;
}
nav.scrolled .nav-logo { color: var(--charcoal); }
.nav-logo span { color: var(--gold); }
.nav-links { display: flex; gap: 40px; list-style: none; }
.nav-links a {
  font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(253,252,250,0.75); text-decoration: none; transition: color 0.3s;
}
nav.scrolled .nav-links a { color: var(--gray); }
.nav-links a:hover { color: var(--gold); }

/* LANGUAGE SWITCHER SIMPLIFICADO */
.lang-switcher { position: relative; }
.lang-trigger {
  display: flex; align-items: center; justify-content: center;
  background: none; border: 1px solid rgba(255,255,255,0.3); 
  border-radius: 50%; width: 40px; height: 40px; cursor: pointer;
  transition: all 0.3s ease; color: var(--white);
}
nav.scrolled .lang-trigger { border-color: var(--stone); color: var(--gray); }
.lang-trigger:hover { border-color: var(--gold); }

.lang-chevron { font-size: 7px; color: rgba(253,252,250,0.5); transition: transform 0.3s, color 0.4s; margin-left: 2px; position: absolute; right: -12px; }
nav.scrolled .lang-chevron { color: var(--gold); }
.lang-switcher.open .lang-chevron { transform: rotate(180deg); }

.lang-dropdown {
  display: none; position: absolute; top: calc(100% + 14px); right: 0;
  background: var(--white); border: 1px solid var(--stone);
  min-width: 185px; z-index: 200;
  box-shadow: 0 12px 40px rgba(30,27,23,0.12);
}
.lang-dropdown::before {
  content: ''; position: absolute; top: -5px; right: 16px;
  width: 9px; height: 9px; background: var(--white);
  border-left: 1px solid var(--stone); border-top: 1px solid var(--stone);
  transform: rotate(45deg);
}
.lang-switcher.open .lang-dropdown { display: block; animation: dropIn 0.22s cubic-bezier(0.16,1,0.3,1); }
@keyframes dropIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:none} }
.lang-btn {
  display: flex; align-items: center; gap: 11px;
  width: 100%; background: none; border: none;
  color: var(--mid); font-family: 'Jost', sans-serif;
  font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
  padding: 12px 18px; cursor: pointer; text-align: left;
  border-bottom: 1px solid rgba(221,216,207,0.5);
  transition: background 0.2s, color 0.2s;
}
.lang-btn:last-child { border-bottom: none; }
.lang-btn:hover { background: var(--cream); color: var(--charcoal); }
.lang-btn.active { color: var(--gold); }
.lang-btn .flag-dot { width: 5px; height: 5px; background: var(--gold); border-radius: 50%; margin-left: auto; }

/* HERO - SOL MATTERHORN */
#hero {
  position: relative; height: 100vh; min-height: 680px;
  display: flex; align-items: flex-end;
  padding-bottom: 100px; overflow: hidden;
}
.hero-bg {
  position: absolute; inset: 0;
  background:
    linear-gradient(to bottom, rgba(30,27,23,0.25) 0%, rgba(30,27,23,0.05) 40%, rgba(248,245,239,0.55) 100%),
    url('https://images.unsplash.com/photo-1531310197839-ccf54634509e?q=80&w=1920&auto=format&fit=crop') center/cover no-repeat;
  transform: scale(1.04);
  animation: heroZoom 20s ease-in-out infinite alternate;
}
@keyframes heroZoom { from{transform:scale(1.04)} to{transform:scale(1.10)} }
.hero-content {
  position: relative; z-index: 2; padding: 0 64px; max-width: 860px;
  opacity: 0; animation: fadeUp 1.4s cubic-bezier(0.16,1,0.3,1) 0.4s forwards;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(36px)} to{opacity:1;transform:none} }
.hero-eyebrow {
  font-size: 10px; letter-spacing: 0.42em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 22px;
  display: flex; align-items: center; gap: 14px;
}
.hero-eyebrow::before { content:''; width:36px; height:1px; background:var(--gold); display:block; }
.hero-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(52px, 7.5vw, 92px);
  font-weight: 300; line-height: 0.95;
  color: var(--white); margin-bottom: 30px;
  text-shadow: 0 2px 20px rgba(30,27,23,0.15);
}
.hero-title em { font-style: italic; color: var(--gold-light); }
.hero-sub {
  font-size: 13px; letter-spacing: 0.1em; line-height: 1.9;
  color: rgba(253,252,250,0.8); max-width: 400px; margin-bottom: 44px;
}
.hero-cta {
  display: inline-flex; align-items: center; gap: 14px;
  text-decoration: none; font-size: 10px; letter-spacing: 0.28em;
  text-transform: uppercase; color: var(--charcoal);
  background: var(--cream); padding: 17px 34px;
  transition: all 0.4s ease; position: relative; overflow: hidden;
}
.hero-cta::before {
  content:''; position:absolute; inset:0; background:var(--gold);
  transform:translateX(-101%); transition:transform 0.4s cubic-bezier(0.77,0,0.175,1);
}
.hero-cta span, .hero-cta svg { position: relative; z-index:1; }
.hero-cta:hover { color: var(--white); }
.hero-cta:hover::before { transform:translateX(0); }
.hero-cta svg { transition: transform 0.3s; }
.hero-cta:hover svg { transform: translateX(5px); }

/* PILLARS STRIP */
#pillars {
  background: var(--white);
  border-top: 1px solid var(--stone);
  border-bottom: 1px solid var(--stone);
  padding: 0 64px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
}
.pillar {
  padding: 48px 40px;
  border-right: 1px solid var(--stone);
  text-align: center;
  position: relative;
  transition: background 0.3s;
}
.pillar:last-child { border-right: none; }
.pillar:hover { background: var(--cream); }
.pillar-icon { font-size: 28px; margin-bottom: 16px; display: block; }
.pillar-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px; font-weight: 400; color: var(--charcoal);
  margin-bottom: 10px; letter-spacing: 0.02em;
}
.pillar-text { font-size: 11px; color: var(--gray); letter-spacing: 0.08em; line-height: 1.8; }

/* SECTION BASICS */
section { padding: 110px 64px; }
.section-label {
  font-size: 9px; letter-spacing: 0.44em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 18px;
  display: flex; align-items: center; gap: 14px;
}
.section-label::before { content:''; width:26px; height:1px; background:var(--gold); display:block; }
.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(36px, 4.5vw, 60px);
  font-weight: 300; line-height: 1.08;
  color: var(--charcoal); max-width: 560px; margin-bottom: 60px;
}
.section-title em { font-style: italic; color: var(--gold); }

/* SERVICES */
#services { background: var(--cream); }
.services-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1px; background: var(--stone);
  border: 1px solid var(--stone);
}
.service-card {
  background: var(--cream); padding: 48px 40px;
  position: relative; overflow: hidden;
  transition: background 0.4s;
}
.service-card::after {
  content:''; position:absolute; bottom:0; left:0;
  width:0; height:2px; background:var(--gold);
  transition: width 0.5s cubic-bezier(0.77,0,0.175,1);
}
.service-card:hover { background: var(--white); }
.service-card:hover::after { width: 100%; }
.service-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px; letter-spacing: 0.3em;
  color: var(--gold); margin-bottom: 32px; opacity: 0.8;
  display: block;
}
.service-icon {
  width: 40px; height: 40px; margin-bottom: 24px;
  color: var(--gold); opacity: 0.75;
  transition: opacity 0.3s, transform 0.3s;
}
.service-card:hover .service-icon { opacity: 1; transform: scale(1.06); }
.service-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px; font-weight: 400;
  color: var(--charcoal); margin-bottom: 14px; line-height: 1.2;
}
.service-desc { font-size: 12px; line-height: 1.85; color: var(--mid); letter-spacing: 0.04em; }

/* EDITORIAL QUOTE */
#editorial {
  background: var(--white);
  padding: 100px 64px;
  border-top: 1px solid var(--stone);
  border-bottom: 1px solid var(--stone);
  text-align: center;
}
.editorial-quote {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(28px, 4vw, 48px);
  font-weight: 300; font-style: italic;
  color: var(--charcoal); line-height: 1.4;
  max-width: 900px; margin: 0 auto 32px;
}
.editorial-quote em { color: var(--gold); font-style: normal; }
.editorial-source { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gray); }

/* ABOUT */
#about {
  background: var(--cream-deep);
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 0; padding: 0;
  min-height: 580px;
}
.about-visual { position: relative; overflow: hidden; }
.about-visual img { width:100%; height:100%; object-fit:cover; transition:transform 0.9s ease; filter: brightness(0.92); }
.about-visual:hover img { transform: scale(1.04); }
.about-text {
  padding: 100px 72px;
  display: flex; flex-direction: column; justify-content: center;
  background: var(--cream-deep);
}
.about-body { font-size: 13px; line-height: 2.1; color: var(--mid); letter-spacing: 0.04em; margin-bottom: 36px; }

/* DESTINATIONS */
#destinations { background: var(--cream); padding: 110px 64px; }
.dest-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.dest-card { position: relative; height: 540px; overflow: hidden; }
.dest-img {
  width:100%; height:100%; object-fit:cover;
  transition: transform 1s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.6s;
  filter: brightness(0.7) saturate(0.95);
}
.dest-card:hover .dest-img { transform: scale(1.06); filter: brightness(0.45) saturate(0.85); }
.dest-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(30,27,23,0.82) 0%, rgba(30,27,23,0.05) 55%, transparent 100%);
}
.dest-info { position: absolute; bottom:0; left:0; right:0; padding: 32px 30px; z-index:2; }
.dest-name { font-family:'Cormorant Garamond',serif; font-size:38px; font-weight:300; color:var(--white); margin-bottom:6px; line-height:1; }

/* PROPERTY SERVICES */
#property { background: var(--white); border-top: 1px solid var(--stone); padding: 110px 64px; }
.property-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--stone); border: 1px solid var(--stone); }
.prop-card { background: var(--white); padding: 40px 32px; transition: background 0.35s; position: relative; }

/* CONTACT */
#contact {
  background: var(--white);
  border-top: 1px solid var(--stone);
  display: grid; grid-template-columns: 1fr 1fr; gap: 0;
  padding: 0;
}
.contact-info { padding: 100px 72px; background: var(--cream-deep); }
.contact-form { padding: 100px 72px; display:flex; flex-direction:column; gap:0; background:var(--white); }

/* FOOTER */
footer {
  background: var(--charcoal); padding: 44px 64px;
  display: flex; align-items: center; justify-content: space-between;
}
.footer-logo { font-family:'Cormorant Garamond',serif; font-size:17px; letter-spacing:0.38em; text-transform:uppercase; color:var(--white); }
.footer-logo span { color:var(--gold); }

/* WHATSAPP */
.wa-btn {
  position: fixed; bottom: 30px; left: 30px; z-index: 500;
  display: flex; align-items: center; gap: 0;
  text-decoration: none; border-radius: 50px; overflow: hidden;
}
.wa-icon { width: 56px; height: 56px; background: #25D366; display: flex; align-items: center; justify-content: center; }

/* REVEAL */
.reveal { opacity:0; transform:translateY(28px); transition:opacity 0.9s cubic-bezier(0.16,1,0.3,1), transform 0.9s cubic-bezier(0.16,1,0.3,1); }
.reveal.visible { opacity:1; transform:none; }

/* RESPONSIVE */
@media (max-width: 1024px) {
  nav { padding: 18px 22px; }
  .nav-links { display: none; }
  section { padding: 64px 22px; }
  .hero-content { padding: 0 22px; }
  .services-grid, .dest-grid, .property-grid, #pillars { grid-template-columns: 1fr; }
  #contact { grid-template-columns: 1fr; }
}

/* ARABIC RTL */
html[lang="ar"] body { direction: rtl; }
html[lang="ar"] .lang-dropdown { right: auto; left: 0; }
</style>
</head>
<body>

<a class="wa-btn" href="https://wa.me/41783175690" target="_blank" rel="noopener">
  <div class="wa-icon">
    <svg viewBox="0 0 32 32" fill="white" width="26"><path d="M16 3C9.373 3 4 8.373 4 15c0 2.385.668 4.61 1.81 6.51L4 29l7.697-1.785A11.94 11.94 0 0016 27c6.627 0 12-5.373 12-12S22.627 3 16 3zm0 21.75c-2.055 0-3.97-.562-5.605-1.54l-.402-.237-4.572 1.059 1.09-4.453-.26-.42A9.743 9.743 0 016.25 15C6.25 9.615 10.615 5.25 16 5.25S25.75 9.615 25.75 15 21.385 24.75 16 24.75zm5.388-7.373c-.294-.147-1.74-.858-2.01-.955-.27-.098-.466-.147-.663.147-.197.294-.76.955-.932 1.152-.172.196-.343.22-.637.073-.294-.147-1.242-.458-2.366-1.46-.874-.78-1.464-1.743-1.636-2.037-.172-.294-.018-.453.129-.6.132-.13.294-.343.441-.514.147-.172.196-.294.294-.49.098-.196.049-.368-.025-.514-.073-.147-.663-1.6-.908-2.19-.24-.575-.483-.497-.663-.506l-.564-.01c-.196 0-.514.073-.784.368-.27.294-1.03 1.005-1.03 2.45s1.054 2.842 1.2 3.038c.147.196 2.075 3.17 5.026 4.445.702.303 1.25.484 1.677.62.705.224 1.347.192 1.854.116.565-.084 1.74-.711 1.986-1.398.245-.686.245-1.274.172-1.397-.073-.122-.27-.196-.564-.343z"/></svg>
  </div>
</a>

<nav id="nav">
  <a href="#" class="nav-logo">Open<span>&nbsp;Valais</span></a>
  <ul class="nav-links">
    <li><a href="#services">Services</a></li>
    <li><a href="#about">Philosophy</a></li>
    <li><a href="#destinations">Destinations</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
  <div class="lang-switcher" id="langSwitcher">
    <button class="lang-trigger" onclick="toggleLangMenu()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="2" y1="12" x2="22" y2="12"></line>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
      </svg>
      <span class="lang-chevron">▼</span>
    </button>
    <div class="lang-dropdown" id="langDropdown">
      <button class="lang-btn active" data-lang="en" onclick="setLang('en')">English<span class="flag-dot"></span></button>
      <button class="lang-btn" data-lang="es" onclick="setLang('es')">Español<span class="flag-dot"></span></button>
      <button class="lang-btn" data-lang="fr" onclick="setLang('fr')">Français<span class="flag-dot"></span></button>
      <button class="lang-btn" data-lang="de" onclick="setLang('de')">Deutsch<span class="flag-dot"></span></button>
      <button class="lang-btn" data-lang="zh" onclick="setLang('zh')">中文<span class="flag-dot"></span></button>
      <button class="lang-btn" data-lang="ru" onclick="setLang('ru')">Русский<span class="flag-dot"></span></button>
      <button class="lang-btn" data-lang="ar" onclick="setLang('ar')">العربية<span class="flag-dot"></span></button>
    </div>
  </div>
</nav>

<section id="hero">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <p class="hero-eyebrow">Valais, Switzerland</p>
    <h1 class="hero-title">Your Alpine<br><em>Journey,</em><br>Reimagined</h1>
    <p class="hero-sub">Bespoke transfers, curated mountain experiences, and personalised holidays.</p>
    <a href="#contact" class="hero-cta"><span>Begin Your Journey</span></a>
  </div>
</section>

<script>
document.addEventListener("DOMContentLoaded", function() {
    
    // 1. Detección automática de idioma
    const userLang = (navigator.language || navigator.userLanguage).split('-')[0];
    const supportedLangs = ['en', 'es', 'fr', 'de', 'zh', 'ru', 'ar'];
    setLang(supportedLangs.includes(userLang) ? userLang : 'en');

    // 2. Animaciones de scroll
    const revealObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

    // 3. Efecto Navbar
    window.addEventListener('scroll', () => {
        const nav = document.getElementById('nav');
        if (window.scrollY > 50) nav.classList.add('scrolled');
        else nav.classList.remove('scrolled');
    });

    // 4. Lógica de Idiomas
    window.toggleLangMenu = function() {
        document.getElementById('langSwitcher').classList.toggle('open');
    };

    window.setLang = function(lang) {
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        const btn = document.querySelector(`.lang-btn[data-lang="${lang}"]`);
        if (btn) btn.classList.add('active');
        document.documentElement.setAttribute('lang', lang);
        document.getElementById('langSwitcher').classList.remove('open');
        // Aquí se cargaría la lógica de traducción de textos
    };

    document.addEventListener('click', (e) => {
        if (!document.getElementById('langSwitcher').contains(e.target)) {
            document.getElementById('langSwitcher').classList.remove('open');
        }
    });
});
</script>

</body>
